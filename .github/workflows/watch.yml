name: watch

on:
  # DISABLED: the bot now runs on Vercel (webhook + /api/scan). This GitHub
  # scanner is kept only as a manual backup. Re-enable the schedule below if
  # you ever want GitHub to take over again.
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write              # to commit state.json back

concurrency:
  group: watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run one check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WANT_BEDROOMS: "2,3"
          LIST_PAGES: "2"
          NOTIFY_ON_UNKNOWN: "true"
          WATCHDOG_AFTER: "2"
          HEARTBEAT_HOURS: "24"
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        run: node run-once.mjs
      - name: Persist state (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f state.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "chore: update watch state [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
